<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unit Converter</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-blue-50 font-sans">
        <section class="px-6 mb-10">
            <h2 class="text-gray-900"> Unit Converter WIP</h2>
            <div class="bg-white border-gray-200 rounded-2xl overflow-hidden ">

                <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-100">


                    <div class=" lg:flex items-center gap-6 border-gray-900 hover:bg-red-600">
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Weight</a>
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Distance</a>
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Temperate</a>
                    </div>                       

                </nav>
            </div>
        </section>
        <section class="flex">
            <div>
                <label id="userUnitID" class="block mb-2.5 text-sm font-medium text-heading">KM</label>
                <input type="number" id="inputID" class="mb-1 w-24 h-24 items-center justify-center">
            </div>
            <div>
                <h2 class="flex items-center justify-center border-gray-900 bg-gray-900 h-auto w-auto m-10 p-10 text-white">to</h2>
                <button onClick="convert()" class="flex items-center justify-center border-gray-900 bg-gray-900 h-10 w-10 m-10 p-10 text-white hover:bg-purple-500">Convert</button>
                <button onClick="swapUnits()" class="flex items-center justify-center border-gray-900 bg-gray-900 h-10 w-10 m-10 p-10 text-white hover:bg-purple-500">Swap Units</button>
            </div>
            <div>
                <label id="resultUnitID" class="block mb-2.5 text-sm font-medium text-heading">MILES</label>
                <div id="resultID" class="flex mb-1 w-24 h-24 items-center justify-center bg-white">0</div>
            </div>
        </section>
        <script src="../scripts/conversion.js"></script>
    </body>
</html>
