<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unit Converter</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-blue-50 font-sans">
        <section class=" alignpx-6 mb-10">
            <h2 class="text-gray-900"> Unit Converter WIP</h2>
            <div class="bg-white border-gray-200 rounded-2xl overflow-hidden ">

                <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-100">


                    <div class=" lg:flex items-center gap-6 border-gray-900">
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Weight</a>
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Distance</a>
                        <a href="#" class="text-sm text-gray-600 hover:text-blue-600">Temperate</a>
                    </div>                       

                </nav>
            </div>
        </section>
        <section class="py-20">
            <section class="flex items-center justify-center w-2xl">
                <div class="">
                    <label id="userUnitID" class="flex bg-gray-400 text-sm font-medium text-heading items-center justify-center">KM</label>
                    <input type="number" id="inputID" class=" mb-1 w-24 h-24  justify-center">
                </div>
                <div>
                    <h2 class="flex items-center justify-center  h-auto w-auto m-10  text-gray-900">-></h2>
                    
                </div>
                <div>
                    <label id="resultUnitID" class="flex bg-gray-400 text-sm font-medium text-heading items-center justify-center">MILES</label>
                    <div id="resultID" class="flex mb-1 w-24 h-24 items-center justify-center bg-white">0</div>
                </div>
            </section>
            <section class="flex items-center justify-center w-2xl">
                <button onClick="convert()" class="flex items-center justify-center bg-gray-900 text-white bg-red-500 w-48 h-12 rounded-lg m-2 hover:bg-blue-600 hover:text-gray-900">Convert</button>
                <button onClick="swapUnits()" class="flex items-center justify-center text-white bg-purple-500 w-48 h-12 h-12 rounded-lg m-2 hover:bg-blue-600 hover:text-gray-900">Swap Units</button>
            </section>
        </section>
        <script src="../scripts/conversion.js"></script>
    </body>
</html>
